<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bliss Tech | Pay Less For More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bliss-orange: #F15A24;
            --bliss-maroon: #800000;
            --bliss-gold: #D4AF37;
            --bliss-dark: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .bg-bliss-gradient {
            background: linear-gradient(135deg, var(--bliss-maroon) 0%, var(--bliss-orange) 100%);
        }

        .text-bliss-orange { color: var(--bliss-orange); }
        .bg-bliss-orange { background-color: var(--bliss-orange); }
        .border-bliss-orange { border-color: var(--bliss-orange); }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .nav-link.active {
            border-bottom: 3px solid var(--bliss-orange);
            color: var(--bliss-orange);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Modal Overlay */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="navigateTo('home')">
                <div class="w-10 h-10 bg-bliss-gradient rounded-lg flex items-center justify-center text-white font-bold text-xl">B</div>
                <span class="text-2xl font-black tracking-tighter text-bliss-maroon">BLISS<span class="text-bliss-orange">TECH</span></span>
            </div>

            <div class="hidden md:flex space-x-8 font-medium">
                <button onclick="navigateTo('home')" class="nav-link">Shop</button>
                <button onclick="navigateTo('about')" class="nav-link">About</button>
                <button onclick="navigateTo('contact')" class="nav-link">Contact</button>
                <button id="adminLink" onclick="navigateTo('admin-dashboard')" class="nav-link hidden text-red-600">Admin Panel</button>
            </div>

            <div class="flex items-center space-x-5">
                <div class="relative cursor-pointer" onclick="navigateTo('cart')">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-bliss-orange text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </div>
                <div id="userMenu" class="flex items-center space-x-2 border-l pl-4">
                    <button onclick="navigateTo('login')" class="bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold hover:bg-gray-200">Login</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="min-h-screen pb-20">
        <!-- Dynamic content injected here -->
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-[100] bg-white border-l-4 border-bliss-orange p-4 shadow-2xl rounded flex items-center space-x-3">
        <i class="fa-solid fa-circle-check text-green-500"></i>
        <p id="toastMessage" class="font-medium"></p>
    </div>

    <script>
        // --- DATA STORE ---
        const DB = {
            get: (key) => JSON.parse(localStorage.getItem(`blisstech_${key}`)) || [],
            set: (key, val) => localStorage.setItem(`blisstech_${key}`, JSON.stringify(val)),
            currentUser: () => JSON.parse(localStorage.getItem('blisstech_user')) || null
        };

        // Initialize Defaults if empty
        if (DB.get('products').length === 0) {
            DB.set('products', [
                { id: 1, name: 'iPhone 15 Pro', brand: 'Apple', category: 'phones', price: 24000, stock: 5, img: 'https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400', desc: 'Titanium build with A17 Pro chip.' },
                { id: 2, name: 'HP Victus 15', brand: 'HP', category: 'laptops', price: 18500, stock: 3, img: 'https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=400', desc: 'Powerful gaming laptop with RTX 3050.' },
                { id: 3, name: 'PS5 Digital Edition', brand: 'Sony', category: 'consoles', price: 12500, stock: 10, img: 'https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=400', desc: 'Next-gen gaming experience.' },
                { id: 4, name: 'Samsung S24 Ultra', brand: 'Samsung', category: 'phones', price: 28000, stock: 4, img: 'https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=400', desc: 'Galaxy AI is here.' }
            ]);
        }

        // --- STATE MANAGEMENT ---
        let currentView = 'home';
        let cart = DB.get('cart');
        let products = DB.get('products');
        let filterCategory = 'all';
        let searchQuery = '';

        // --- ROUTING ENGINE ---
        function navigateTo(view) {
            currentView = view;
            render();
            window.scrollTo(0,0);
        }

        // --- UI COMPONENTS ---

        function render() {
            const container = document.getElementById('app-container');
            const user = DB.currentUser();
            
            // Toggle Admin Link
            document.getElementById('adminLink').classList.toggle('hidden', user?.role !== 'admin');
            
            // User Header Update
            const userMenu = document.getElementById('userMenu');
            if (user) {
                userMenu.innerHTML = `
                    <span class="text-sm font-bold text-bliss-maroon hidden sm:inline">Hi, ${user.name}</span>
                    <button onclick="logout()" class="text-xs text-gray-500 hover:text-red-500">Logout</button>
                `;
            } else {
                userMenu.innerHTML = `<button onclick="navigateTo('login')" class="bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold hover:bg-gray-200">Login</button>`;
            }

            switch(viewLogic(currentView)) {
                case 'home': container.innerHTML = renderHome(); break;
                case 'login': container.innerHTML = renderLogin(); break;
                case 'signup': container.innerHTML = renderSignup(); break;
                case 'cart': container.innerHTML = renderCart(); break;
                case 'checkout': container.innerHTML = renderCheckout(); break;
                case 'admin-dashboard': container.innerHTML = renderAdmin(); break;
                case 'about': container.innerHTML = renderAbout(); break;
                case 'contact': container.innerHTML = renderContact(); break;
            }
            updateCartUI();
        }

        function viewLogic(view) { return view; }

        // --- PAGES ---

        function renderHome() {
            const filtered = products.filter(p => {
                const matchesCat = filterCategory === 'all' || p.category === filterCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            return `
                <section class="bg-bliss-gradient text-white py-16 px-4 text-center">
                    <h1 class="text-4xl md:text-6xl font-black mb-4">PREMIUM TECH. <br>HONEST PRICES.</h1>
                    <p class="text-xl opacity-90 mb-8">Serving Chingola and Kitwe with the best in mobile & computing.</p>
                    <div class="max-w-2xl mx-auto flex bg-white rounded-full p-2 shadow-lg">
                        <input type="text" placeholder="Search HP, iPhone, Samsung..." class="flex-grow px-6 py-2 text-gray-800 rounded-full focus:outline-none" oninput="handleSearch(this.value)">
                        <button class="bg-bliss-orange px-8 py-2 rounded-full font-bold">Search</button>
                    </div>
                </section>

                <div class="container mx-auto px-4 mt-10">
                    <!-- Filters -->
                    <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar">
                        ${['all', 'laptops', 'phones', 'consoles', 'accessories', 'toys'].map(cat => `
                            <button onclick="setFilter('${cat}')" class="px-6 py-2 rounded-full border-2 transition-all whitespace-nowrap ${filterCategory === cat ? 'bg-bliss-maroon border-bliss-maroon text-white' : 'border-gray-200 hover:border-bliss-orange'}">
                                ${cat.charAt(0).toUpperCase() + cat.slice(1)}
                            </button>
                        `).join('')}
                    </div>

                    <!-- Product Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mt-8">
                        ${filtered.map(p => `
                            <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 transition-all">
                                <img src="${p.img}" class="w-full h-48 object-cover" alt="${p.name}">
                                <div class="p-5">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>
                                            <p class="text-xs font-bold text-bliss-orange uppercase">${p.brand}</p>
                                            <h3 class="font-bold text-lg">${p.name}</h3>
                                        </div>
                                        <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-bold">In Stock</span>
                                    </div>
                                    <p class="text-gray-500 text-sm mb-4 line-clamp-2">${p.desc}</p>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xl font-black text-bliss-maroon">K${p.price.toLocaleString()}</span>
                                        <button onclick="addToCart(${p.id})" class="bg-bliss-orange text-white p-3 rounded-xl hover:scale-110 transition-transform">
                                            <i class="fa-solid fa-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderCart() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            return `
                <div class="container mx-auto px-4 py-12 max-w-4xl">
                    <h2 class="text-3xl font-black mb-8 text-bliss-maroon">Your Shopping Cart</h2>
                    ${cart.length === 0 ? `
                        <div class="text-center py-20 bg-white rounded-2xl shadow-sm">
                            <i class="fa-solid fa-cart-arrow-down text-6xl text-gray-200 mb-4"></i>
                            <p class="text-xl text-gray-500">Your cart is feeling light.</p>
                            <button onclick="navigateTo('home')" class="mt-6 bg-bliss-orange text-white px-8 py-3 rounded-full font-bold">Go Shopping</button>
                        </div>
                    ` : `
                        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8">
                            ${cart.map(item => `
                                <div class="flex items-center justify-between border-b py-4 last:border-0">
                                    <div class="flex items-center space-x-4">
                                        <img src="${item.img}" class="w-16 h-16 rounded object-cover">
                                        <div>
                                            <h4 class="font-bold">${item.name}</h4>
                                            <p class="text-sm text-gray-500">K${item.price.toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-4">
                                        <div class="flex items-center border rounded-lg">
                                            <button onclick="updateQty(${item.id}, -1)" class="px-3 py-1 hover:bg-gray-100">-</button>
                                            <span class="px-3 font-bold">${item.quantity}</span>
                                            <button onclick="updateQty(${item.id}, 1)" class="px-3 py-1 hover:bg-gray-100">+</button>
                                        </div>
                                        <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-700">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="bg-bliss-maroon text-white p-8 rounded-2xl flex flex-col md:flex-row justify-between items-center">
                            <div class="mb-4 md:mb-0">
                                <p class="text-sm opacity-80 uppercase tracking-widest">Grand Total</p>
                                <h3 class="text-4xl font-black">K${total.toLocaleString()}</h3>
                            </div>
                            <button onclick="navigateTo('checkout')" class="bg-bliss-orange w-full md:w-auto px-12 py-4 rounded-xl font-bold text-lg hover:bg-white hover:text-bliss-orange transition-colors">
                                Secure Checkout
                            </button>
                        </div>
                    `}
                </div>
            `;
        }

        function renderCheckout() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const delivery = 150;
            const total = subtotal + delivery;

            return `
                <div class="container mx-auto px-4 py-12 max-w-5xl">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <!-- Left: Details -->
                        <div>
                            <h2 class="text-2xl font-bold mb-6">Delivery & Payment</h2>
                            <form onsubmit="handlePayment(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold mb-1">Full Name</label>
                                    <input type="text" required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-bliss-orange outline-none">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-bold mb-1">City</label>
                                        <select class="w-full p-3 border rounded-xl">
                                            <option>Chingola</option>
                                            <option>Kitwe</option>
                                            <option>Other (Zambia)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-bold mb-1">Phone Number</label>
                                        <input type="tel" placeholder="097..." required class="w-full p-3 border rounded-xl">
                                    </div>
                                </div>
                                
                                <div class="pt-6">
                                    <label class="block text-sm font-bold mb-4 uppercase tracking-wider text-gray-500">Choose Payment Method</label>
                                    <div class="grid grid-cols-3 gap-4">
                                        <label class="cursor-pointer">
                                            <input type="radio" name="payMethod" class="hidden peer" checked>
                                            <div class="border-2 p-4 rounded-xl text-center peer-checked:border-bliss-orange peer-checked:bg-orange-50 transition-all">
                                                <i class="fa-solid fa-mobile-screen block text-2xl mb-1 text-yellow-500"></i>
                                                <span class="text-xs font-bold">Airtel</span>
                                            </div>
                                        </label>
                                        <label class="cursor-pointer">
                                            <input type="radio" name="payMethod" class="hidden peer">
                                            <div class="border-2 p-4 rounded-xl text-center peer-checked:border-bliss-orange peer-checked:bg-orange-50 transition-all">
                                                <i class="fa-solid fa-mobile-screen block text-2xl mb-1 text-green-500"></i>
                                                <span class="text-xs font-bold">MTN</span>
                                            </div>
                                        </label>
                                        <label class="cursor-pointer">
                                            <input type="radio" name="payMethod" class="hidden peer">
                                            <div class="border-2 p-4 rounded-xl text-center peer-checked:border-bliss-orange peer-checked:bg-orange-50 transition-all">
                                                <i class="fa-solid fa-credit-card block text-2xl mb-1 text-blue-500"></i>
                                                <span class="text-xs font-bold">Zamtel</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>

                                <button type="submit" id="payBtn" class="w-full bg-bliss-gradient text-white py-4 rounded-xl font-bold text-lg mt-8 hover:shadow-xl transition-shadow">
                                    Pay K${total.toLocaleString()} Now
                                </button>
                            </form>
                        </div>

                        <!-- Right: Summary -->
                        <div class="bg-gray-50 p-8 rounded-3xl h-fit">
                            <h3 class="text-xl font-bold mb-6">Order Summary</h3>
                            <div class="space-y-4 mb-6">
                                ${cart.map(i => `
                                    <div class="flex justify-between text-sm">
                                        <span>${i.name} (x${i.quantity})</span>
                                        <span class="font-bold">K${(i.price * i.quantity).toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="border-t pt-4 space-y-2">
                                <div class="flex justify-between text-gray-600">
                                    <span>Subtotal</span>
                                    <span>K${subtotal.toLocaleString()}</span>
                                </div>
                                <div class="flex justify-between text-gray-600">
                                    <span>Delivery Fee</span>
                                    <span>K${delivery.toLocaleString()}</span>
                                </div>
                                <div class="flex justify-between text-xl font-black text-bliss-maroon pt-2">
                                    <span>Total</span>
                                    <span>K${total.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdmin() {
            return `
                <div class="container mx-auto px-4 py-12">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h2 class="text-3xl font-black text-bliss-maroon">Inventory Control</h2>
                            <p class="text-gray-500">Add or manage Bliss Tech products.</p>
                        </div>
                        <button onclick="toggleModal('addProductModal', true)" class="bg-bliss-orange text-white px-6 py-2 rounded-lg font-bold">
                            + Add New Product
                        </button>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-xs uppercase font-bold text-gray-500 border-b">
                                <tr>
                                    <th class="px-6 py-4">Product</th>
                                    <th class="px-6 py-4">Category</th>
                                    <th class="px-6 py-4">Price (K)</th>
                                    <th class="px-6 py-4">Stock</th>
                                    <th class="px-6 py-4 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${products.map(p => `
                                    <tr class="border-b last:border-0">
                                        <td class="px-6 py-4">
                                            <div class="flex items-center space-x-3">
                                                <img src="${p.img}" class="w-10 h-10 rounded object-cover">
                                                <span class="font-bold">${p.name}</span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4 text-sm">${p.category}</td>
                                        <td class="px-6 py-4 font-mono font-bold">K${p.price.toLocaleString()}</td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-1 rounded text-xs ${p.stock < 5 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                                ${p.stock} units
                                            </span>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600">Delete</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Simple Add Product Modal -->
                <div id="addProductModal" class="fixed inset-0 modal-overlay z-[60] hidden flex items-center justify-center p-4">
                    <div class="bg-white w-full max-w-lg rounded-2xl p-8">
                        <h3 class="text-2xl font-bold mb-6">New Product Entry</h3>
                        <form onsubmit="handleNewProduct(event)" class="space-y-4">
                            <input id="pName" placeholder="Product Name" required class="w-full p-3 border rounded-lg">
                            <div class="grid grid-cols-2 gap-4">
                                <select id="pCat" class="w-full p-3 border rounded-lg">
                                    <option value="laptops">Laptops</option>
                                    <option value="phones">Phones</option>
                                    <option value="consoles">Consoles</option>
                                    <option value="accessories">Accessories</option>
                                    <option value="toys">Electronic Toys</option>
                                </select>
                                <input id="pBrand" placeholder="Brand (e.g. HP)" required class="w-full p-3 border rounded-lg">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <input id="pPrice" type="number" placeholder="Price (Kwacha)" required class="w-full p-3 border rounded-lg">
                                <input id="pStock" type="number" placeholder="Stock Qty" required class="w-full p-3 border rounded-lg">
                            </div>
                            <input id="pImg" placeholder="Image URL (Unsplash/etc)" class="w-full p-3 border rounded-lg" type="file">
                            <textarea id="pDesc" placeholder="Brief description..." class="w-full p-3 border rounded-lg"></textarea>
                            <div class="flex space-x-4 pt-4">
                                <button type="button" onclick="toggleModal('addProductModal', false)" class="flex-grow bg-gray-100 py-3 rounded-lg font-bold">Cancel</button>
                                <button type="submit" class="flex-grow bg-bliss-orange text-white py-3 rounded-lg font-bold">Save Product</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderLogin() {
            return `
                <div class="flex items-center justify-center min-h-[80vh] px-4">
                    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-black text-bliss-maroon">Welcome Back</h2>
                            <p class="text-gray-500">Login to your Bliss Tech account</p>
                        </div>
                        <form onsubmit="handleAuth(event, 'login')" class="space-y-4">
                            <input id="authEmail" type="email" placeholder="Email Address" required class="w-full p-4 border rounded-2xl bg-gray-50 focus:bg-white outline-none ring-bliss-orange focus:ring-2">
                            <input id="authPass" type="password" placeholder="Password" required class="w-full p-4 border rounded-2xl bg-gray-50 focus:bg-white outline-none ring-bliss-orange focus:ring-2">
                            <button type="submit" class="w-full bg-bliss-gradient text-white py-4 rounded-2xl font-black text-lg shadow-lg">Enter Bliss</button>
                        </form>
                        <p class="text-center mt-6 text-sm">New to us? <button onclick="navigateTo('signup')" class="text-bliss-orange font-bold">Create Account</button></p>
                    </div>
                </div>
            `;
        }

        function renderSignup() {
            return `
                <div class="flex items-center justify-center min-h-[80vh] px-4">
                    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-black text-bliss-maroon">Join Bliss Tech</h2>
                            <p class="text-gray-500">Get the best deals first</p>
                        </div>
                        <form onsubmit="handleAuth(event, 'signup')" class="space-y-4">
                            <input id="regName" type="text" placeholder="Full Name" required class="w-full p-4 border rounded-2xl bg-gray-50">
                            <input id="regEmail" type="email" placeholder="Email" required class="w-full p-4 border rounded-2xl bg-gray-50">
                            <input id="regPass" type="password" placeholder="Create Password" required class="w-full p-4 border rounded-2xl bg-gray-50">
                            <select id="regRole" class="w-full p-4 border rounded-2xl bg-gray-50">
                                <option value="customer">I am a Customer</option>
                                <option value="admin">I am Staff (Admin)</option>
                            </select>
                            <button type="submit" class="w-full bg-bliss-gradient text-white py-4 rounded-2xl font-black text-lg">Sign Up</button>
                        </form>
                        <p class="text-center mt-6 text-sm">Already member? <button onclick="navigateTo('login')" class="text-bliss-orange font-bold">Login</button></p>
                    </div>
                </div>
            `;
        }

        function renderAbout() {
            return `
                <div class="container mx-auto px-4 py-20 text-center max-w-3xl">
                    <h2 class="text-5xl font-black text-bliss-maroon mb-6">Our Story</h2>
                    <p class="text-xl text-gray-600 leading-relaxed mb-10">
                        Founded in the heart of the Copperbelt, Bliss Tech was born from a simple mission: To bring premium technology within reach of every Zambian. Whether you are in Chingola or Kitwe, we believe you shouldn't have to overpay for quality.
                    </p>
                    <div class="grid grid-cols-2 gap-8 text-left">
                        <div class="bg-white p-6 rounded-2xl border-l-4 border-bliss-orange shadow-sm">
                            <h4 class="font-bold text-lg mb-2">Chingola Hub</h4>
                            <p class="text-sm text-gray-500">Mpezeni Road, Town Centre. Our main warehouse and repair center.</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border-l-4 border-bliss-maroon shadow-sm">
                            <h4 class="font-bold text-lg mb-2">Kitwe Branch</h4>
                            <p class="text-sm text-gray-500">Obote Avenue. Serving the vibrant students and business community.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContact() {
            return `
                <div class="container mx-auto px-4 py-20">
                    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
                        <div class="md:w-1/3 bg-bliss-gradient p-12 text-white">
                            <h3 class="text-2xl font-bold mb-6">Contact Info</h3>
                            <div class="space-y-6">
                                <div class="flex items-center space-x-4">
                                    <i class="fa-solid fa-phone"></i>
                                    <span>+260 978 000 000</span>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <i class="fa-solid fa-envelope"></i>
                                    <span>sales@blisstech.zm</span>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <i class="fa-solid fa-location-dot"></i>
                                    <span>Chingola/Kitwe, Zambia</span>
                                </div>
                            </div>
                        </div>
                        <div class="md:w-2/3 p-12">
                            <h3 class="text-2xl font-bold mb-6">Send us a message</h3>
                            <form class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <input placeholder="Name" class="p-3 border rounded-lg w-full">
                                    <input placeholder="Email" class="p-3 border rounded-lg w-full">
                                </div>
                                <textarea placeholder="How can we help you?" rows="5" class="p-3 border rounded-lg w-full"></textarea>
                                <button type="button" onclick="showToast('Message sent! We will call you back soon.')" class="bg-bliss-maroon text-white px-8 py-3 rounded-lg font-bold">Send Message</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- LOGIC FUNCTIONS ---

        function handleSearch(val) {
            searchQuery = val;
            render();
        }

        function setFilter(cat) {
            filterCategory = cat;
            render();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(i => i.id === id);
            if (exists) {
                exists.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            showToast(`${product.name} added to cart!`);
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.quantity += delta;
            if (item.quantity < 1) return removeFromCart(id);
            saveCart();
            render();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
            render();
        }

        function saveCart() {
            DB.set('cart', cart);
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('cartCount').innerText = count;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
            }, 3000);
        }

        function handleAuth(e, type) {
            e.preventDefault();
            let user;
            if (type === 'signup') {
                user = {
                    name: document.getElementById('regName').value,
                    email: document.getElementById('regEmail').value,
                    role: document.getElementById('regRole').value,
                };
            } else {
                // Mock Login
                const email = document.getElementById('authEmail').value;
                user = { name: email.split('@')[0], email: email, role: email.includes('admin') ? 'admin' : 'customer' };
            }
            localStorage.setItem('blisstech_user', JSON.stringify(user));
            showToast(`Welcome, ${user.name}!`);
            navigateTo('home');
        }

        function logout() {
            localStorage.removeItem('blisstech_user');
            navigateTo('home');
        }

        function handlePayment(e) {
            e.preventDefault();
            const btn = document.getElementById('payBtn');
            btn.innerText = "Processing Transaction...";
            btn.disabled = true;

            setTimeout(() => {
                showToast("Payment Successful! Order scheduled for delivery.");
                cart = [];
                saveCart();
                navigateTo('home');
            }, 2500);
        }

        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        function handleNewProduct(e) {
            e.preventDefault();
            const newP = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                brand: document.getElementById('pBrand').value,
                category: document.getElementById('pCat').value,
                price: parseFloat(document.getElementById('pPrice').value),
                stock: parseInt(document.getElementById('pStock').value),
                img: document.getElementById('pImg').value || 'https://via.placeholder.com/400',
                desc: document.getElementById('pDesc').value
            };
            products.push(newP);
            DB.set('products', products);
            toggleModal('addProductModal', false);
            showToast("New product launched!");
            render();
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            DB.set('products', products);
            render();
            showToast("Product removed from inventory.");
        }

        // --- INIT ---
        window.onload = render;

    </script>
</body>
</html>
